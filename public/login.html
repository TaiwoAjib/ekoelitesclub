<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./js/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/responsive.css">
<style>
html,body{margin:0;padding:0;background:#F7F3EA}
body{font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;color:#17202F}
input{font-family:'Manrope',sans-serif}
</style>
</helmet>

<div style="min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(170deg,#0B1526,#10203A)">

  <!-- HEADER -->
  <div style="position:sticky;top:0;z-index:50;background:rgba(11,21,38,0.97);border-bottom:1px solid rgba(201,162,75,0.4)">
    <div class="ee-bar" style="max-width:1180px;margin:0 auto;padding:0 32px;height:78px;display:flex;align-items:center;gap:16px">
      <a href="index.html" style="display:flex;align-items:center;gap:13px;text-decoration:none;margin-right:auto">
        <img src="images/logo.jpg" alt="Eko Elites Club crest" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #C9A24B;background:#ffffff"/>
        <span style="display:flex;flex-direction:column;gap:1px">
          <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:17px;color:#F7F3EA;letter-spacing:0.04em">EKO ELITES CLUB INC.</span>
          <span style="font-size:10px;color:#C9A24B;letter-spacing:0.26em;font-weight:700">INDIANA · USA</span>
        </span>
      </a>
      <nav class="ee-nav" style="display:flex;align-items:center;gap:26px">
        <a href="index.html" style="font-size:13.5px;font-weight:600;color:#C9D4E6;text-decoration:none;letter-spacing:0.05em" style-hover="color:#E5C170">Home</a>
        <a href="about.html" style="font-size:13.5px;font-weight:600;color:#C9D4E6;text-decoration:none;letter-spacing:0.05em" style-hover="color:#E5C170">About</a>
        <a href="executives.html" style="font-size:13.5px;font-weight:600;color:#C9D4E6;text-decoration:none;letter-spacing:0.05em" style-hover="color:#E5C170">Executives</a>
        <a href="gallery.html" style="font-size:13.5px;font-weight:600;color:#C9D4E6;text-decoration:none;letter-spacing:0.05em" style-hover="color:#E5C170">Gallery</a>
        <a href="login.html" style="font-size:13.5px;font-weight:700;color:#E5C170;text-decoration:none;letter-spacing:0.05em;border-bottom:2px solid #C9A24B;padding-bottom:3px">Member Login</a>
        <a href="register.html" style="background:#C9A24B;color:#0B1526;font-weight:800;font-size:13.5px;padding:11px 22px;border-radius:999px;text-decoration:none;letter-spacing:0.04em" style-hover="background:#E5C170">Join the Club</a>
      </nav>
    </div>
  </div>

  <!-- LOGIN CARD -->
  <div data-screen-label="Login" style="flex:1;display:flex;align-items:center;justify-content:center;padding:64px 32px">
    <div class="ee-card" style="background:#F7F3EA;border-radius:20px;padding:48px;width:420px;display:flex;flex-direction:column;gap:24px;box-shadow:0 30px 80px rgba(0,0,0,0.4);border-top:4px solid #C9A24B">
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center">
        <img src="images/logo.jpg" alt="Eko Elites Club crest" style="width:76px;height:76px;border-radius:50%;object-fit:cover;border:3px solid #C9A24B;background:#ffffff"/>
        <div style="display:flex;flex-direction:column;gap:4px">
          <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;margin:0;color:#0B1526">Member login</h1>
          <p style="font-size:14px;color:#5B6577;margin:0">Ékò Ilé …Gba Be! Welcome back.</p>
        </div>
      </div>

      <sc-if value="{{ error }}" hint-placeholder-val="{{ false }}">
        <div style="background:#FBEDEA;border:1px solid #E3B3A8;color:#8C3B2A;font-size:14px;font-weight:600;padding:12px 16px;border-radius:10px">{{ error }}</div>
      </sc-if>

      <form onSubmit="{{ submit }}" style="display:flex;flex-direction:column;gap:16px">
        <label style="display:flex;flex-direction:column;gap:7px">
          <span style="font-size:12px;font-weight:800;letter-spacing:0.14em;color:#3A4456">EMAIL</span>
          <input name="email" type="email" required="required" placeholder="you@email.com" style="border:1px solid #D8CEB8;border-radius:10px;padding:13px 16px;font-size:15px;background:#ffffff;color:#17202F;outline:none" style-focus="border-color:#C9A24B;box-shadow:0 0 0 3px rgba(201,162,75,0.18)"/>
        </label>
        <label style="display:flex;flex-direction:column;gap:7px">
          <span style="font-size:12px;font-weight:800;letter-spacing:0.14em;color:#3A4456">PASSWORD</span>
          <input name="password" type="password" required="required" placeholder="Your password" style="border:1px solid #D8CEB8;border-radius:10px;padding:13px 16px;font-size:15px;background:#ffffff;color:#17202F;outline:none" style-focus="border-color:#C9A24B;box-shadow:0 0 0 3px rgba(201,162,75,0.18)"/>
        </label>
        <button type="submit" style="background:#C9A24B;color:#0B1526;font-family:'Manrope',sans-serif;font-weight:800;font-size:15.5px;padding:15px;border-radius:999px;border:none;cursor:pointer;margin-top:4px" style-hover="background:#E5C170">Log In</button>
      </form>

      <p style="font-size:14px;color:#5B6577;margin:0;text-align:center">New here? <a href="register.html" style="color:#A9812F;font-weight:700;text-decoration:none">Apply for membership</a>.</p>
    </div>
  </div>

  <!-- FOOTER BAR -->
  <div style="background:#080F1D;color:#8794A8;border-top:3px solid #C9A24B">
    <div style="max-width:1180px;margin:0 auto;padding:22px 32px;display:flex;justify-content:space-between;gap:16px;font-size:12.5px">
      <span>© 2026 Eko Elites Club Inc. All rights reserved.</span>
      <span style="letter-spacing:0.12em">EKO ONI BAJE</span>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { error: '', busy: false };

  renderVals() {
    return {
      error: this.state.error,
      submit: (e) => {
        e.preventDefault();
        if (this.state.busy) return;
        const d = Object.fromEntries(new FormData(e.target));
        const email = d.email.trim().toLowerCase();
        this.setState({ busy: true, error: '' });
        import('/js/api.js').then(api => api.login(email, d.password)).then((r) => {
          localStorage.setItem('eec_token', r.token);
          window.location.href = 'profile.html';
        }).catch((err) => {
          if (err.status === 401) {
            this.setState({ busy: false, error: 'Email or password not recognized.' });
          } else {
            this.setState({ busy: false, error: 'Could not reach the membership database. Please try again. (' + err.message + ')' });
          }
        });
      }
    };
  }
}
</script>
</body>
</html>
